<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Club Admin Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-only { display: none; }
        .is-admin .admin-only { display: block; }
        .is-admin .admin-flex { display: flex; }
        .is-admin .admin-table-cell { display: table-cell; }
    </style>
</head>
<body id="mainBody" class="bg-gray-100 min-h-screen pb-12 font-sans">

    <nav class="bg-slate-900 text-white p-4 shadow-lg mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-indigo-400">Go Club <span class="text-white">Tournament</span></h1>
            <div class="flex items-center space-x-4">
                <button id="loginBtn" onclick="toggleAdmin()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-sm font-bold transition">Admin Login</button>
                <button onclick="exportCSV()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm transition">Esporta CSV</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6 admin-only">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-indigo-500">
                <h2 class="text-lg font-bold mb-4 text-gray-800 uppercase tracking-wider text-sm">Pannello Admin</h2>
                
                <div class="space-y-4">
                    <div class="p-3 bg-gray-50 rounded">
                        <p class="text-xs font-bold text-gray-500 mb-2">NUOVO GIOCATORE</p>
                        <input id="pName" type="text" placeholder="Nome Socio" class="w-full p-2 border rounded mb-2 text-sm">
                        <input id="pRank" type="number" placeholder="Grado (es. -10 per 10k)" class="w-full p-2 border rounded text-sm">
                        <button onclick="addPlayer()" class="w-full mt-2 bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700 transition">Aggiungi</button>
                    </div>

                    <div class="p-3 bg-emerald-50 rounded">
                        <p class="text-xs font-bold text-emerald-700 mb-2">NUOVO RISULTATO</p>
                        <select id="winSel" class="w-full p-2 border rounded mb-2 text-sm"></select>
                        <select id="loseSel" class="w-full p-2 border rounded text-sm"></select>
                        <button onclick="recordMatch()" class="w-full mt-2 bg-emerald-600 text-white py-2 rounded font-bold hover:bg-emerald-700 transition">Salva Vittoria</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-8 space-y-6" id="rankingSection">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800 italic">Classifica McMahon Ufficiale</h2>
                    <span class="text-xs text-gray-400 font-mono">2026 Season</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-xs font-bold text-gray-400 uppercase bg-gray-50 border-b">
                                <th class="px-6 py-3">Giocatore</th>
                                <th class="px-6 py-3 text-center">Grado</th>
                                <th class="px-6 py-3 text-center">PM</th>
                                <th class="px-6 py-3 text-center text-gray-300 italic">V - S</th>
                                <th class="px-6 py-3 admin-only">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="rankTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800 uppercase text-sm tracking-widest">Cronologia Incontri</h2>
                    <button onclick="clearMatches()" class="admin-only text-xs text-red-500 hover:underline">Reset Log</button>
                </div>
                <div class="max-h-80 overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="matchLogBody" class="divide-y divide-gray-50 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURAZIONE PASSWORD
        const ADMIN_PASSWORD = "go-club-admin"; // Cambiala qui!
        let isAdmin = false;

        let players = JSON.parse(localStorage.getItem('go_v3_players')) || [];
        let matches = JSON.parse(localStorage.getItem('go_v3_matches')) || [];

        function toggleAdmin() {
            if (!isAdmin) {
                const pass = prompt("Inserisci la password amministratore:");
                if (pass === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('mainBody').classList.add('is-admin');
                    document.getElementById('loginBtn').innerText = "Logout Admin";
                    document.getElementById('rankingSection').classList.replace('lg:col-span-12', 'lg:col-span-8');
                } else {
                    alert("Password errata!");
                }
            } else {
                isAdmin = false;
                document.getElementById('mainBody').classList.remove('is-admin');
                document.getElementById('loginBtn').innerText = "Admin Login";
            }
            render();
        }

        function save() {
            localStorage.setItem('go_v3_players', JSON.stringify(players));
            localStorage.setItem('go_v3_matches', JSON.stringify(matches));
            render();
        }

        function addPlayer() {
            const n = document.getElementById('pName');
            const r = document.getElementById('pRank');
            if (n.value.trim() && !isNaN(parseInt(r.value))) {
                players.push({ id: Date.now().toString(), name: n.value.trim(), initialRank: parseInt(r.value), wins: 0, losses: 0 });
                n.value = ''; r.value = ''; save();
            }
        }

        function recordMatch() {
            const wId = document.getElementById('winSel').value;
            const lId = document.getElementById('loseSel').value;
            if (wId && lId && wId !== lId) {
                const w = players.find(p => p.id === wId);
                const l = players.find(p => p.id === lId);
                w.wins++; l.losses++;
                matches.unshift({ date: new Date().toLocaleDateString('it-IT'), winner: w.name, loser: l.name });
                save();
            }
        }

        function deletePlayer(id) {
            if(confirm("Eliminare definitivamente il socio?")) {
                players = players.filter(p => p.id !== id);
                save();
            }
        }

        function clearMatches() {
            if(confirm("Svuotare lo storico?")) { matches = []; save(); }
        }

        function render() {
            const table = document.getElementById('rankTableBody');
            table.innerHTML = '';

            const sorted = players.map(p => {
                const curRank = p.initialRank + Math.floor((p.wins - p.losses) / 3);
                const pm = (p.initialRank + 30) + p.wins;
                return { ...p, curRank, pm };
            }).sort((a, b) => b.pm - a.pm);

            sorted.forEach(p => {
                const rankText = p.curRank < 0 ? Math.abs(p.curRank) + "k" : p.curRank + "d";
                table.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b last:border-0">
                        <td class="px-6 py-4 font-bold text-slate-700">${p.name}</td>
                        <td class="px-6 py-4 text-center font-mono font-bold text-indigo-500">${rankText}</td>
                        <td class="px-6 py-4 text-center font-black text-slate-800">${p.pm}</td>
                        <td class="px-6 py-4 text-center text-gray-300 text-xs">${p.wins}V - ${p.losses}S</td>
                        <td class="px-6 py-4 admin-only">
                             <button onclick="deletePlayer('${p.id}')" class="text-red-400 hover:text-red-600">✕</button>
                        </td>
                    </tr>`;
            });

            const opts = '<option value="">- Seleziona -</option>' + 
                         players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            document.getElementById('winSel').innerHTML = opts;
            document.getElementById('loseSel').innerHTML = opts;

            document.getElementById('matchLogBody').innerHTML = matches.map(m => `
                <tr class="border-b">
                    <td class="px-6 py-3 text-gray-400 text-xs">${m.date}</td>
                    <td class="px-6 py-3"><span class="text-emerald-600 font-bold">🏆 ${m.winner}</span> vince contro ${m.loser}</td>
                </tr>
            `).join('');
        }

        function exportCSV() {
            let csv = "Giocatore,Punti McMahon,Vittorie,Sconfitte\n";
            players.forEach(p => csv += `${p.name},${p.initialRank + 30 + p.wins},${p.wins},${p.losses}\n`);
            window.open('data:text/csv;charset=utf-8,' + encodeURI(csv));
        }

        render();
    </script>
</body>
</html>
