<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Club Manager - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-12 font-sans">

    <nav class="bg-indigo-800 text-white p-4 shadow-md mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">Go Tournament Manager</h1>
            <button onclick="exportCSV()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm font-semibold transition">Esporta CSV</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">Registra Socio</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Nome e Cognome</label>
                        <input id="pName" type="text" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Grado (15k = -15, 1d = 1)</label>
                        <input id="pRank" type="number" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button onclick="addPlayer()" class="w-full bg-indigo-700 text-white py-2 rounded-md font-bold hover:bg-indigo-800 transition shadow-sm">Aggiungi Giocatore</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">Esito Partita</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-semibold text-emerald-600 uppercase">Vincitore</label>
                        <select id="winSel" class="w-full p-2 border rounded-md bg-emerald-50"></select>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Sconfitto</label>
                        <select id="loseSel" class="w-full p-2 border rounded-md bg-gray-50"></select>
                    </div>
                    <button onclick="recordMatch()" class="w-full bg-emerald-600 text-white py-2 rounded-md font-bold hover:bg-emerald-700 transition shadow-sm">Registra Vittoria</button>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-8 space-y-6">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b">
                    <h2 class="text-lg font-bold text-gray-800">Classifica Generale (McMahon)</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-xs font-bold text-gray-400 uppercase bg-gray-50 italic">
                                <th class="px-6 py-3 border-b">Giocatore</th>
                                <th class="px-6 py-3 border-b text-center">Grado Attuale</th>
                                <th class="px-6 py-3 border-b text-center">Punti PM</th>
                                <th class="px-6 py-3 border-b text-center">V / S</th>
                                <th class="px-6 py-3 border-b"></th>
                            </tr>
                        </thead>
                        <tbody id="rankTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800">Storico Incontri</h2>
                    <button onclick="clearMatches()" class="text-xs text-red-400 hover:text-red-600">Svuota log</button>
                </div>
                <div class="max-h-80 overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="matchLogBody" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('goClub_players_v2')) || [];
        let matches = JSON.parse(localStorage.getItem('goClub_matches_v2')) || [];

        function save() {
            localStorage.setItem('goClub_players_v2', JSON.stringify(players));
            localStorage.setItem('goClub_matches_v2', JSON.stringify(matches));
            render();
        }

        function addPlayer() {
            const nameInput = document.getElementById('pName');
            const rankInput = document.getElementById('pRank');
            const name = nameInput.value.trim();
            const rank = parseInt(rankInput.value);

            if (name !== "" && !isNaN(rank)) {
                const newPlayer = {
                    id: Date.now().toString(),
                    name: name,
                    initialRank: rank,
                    wins: 0,
                    losses: 0
                };
                players.push(newPlayer);
                nameInput.value = '';
                rankInput.value = '';
                save();
            } else {
                alert("Per favore, inserisci un nome valido e un grado numerico.");
            }
        }

        function recordMatch() {
            const wId = document.getElementById('winSel').value;
            const lId = document.getElementById('loseSel').value;

            if (wId && lId && wId !== lId) {
                const winner = players.find(p => p.id === wId);
                const loser = players.find(p => p.id === lId);
                
                winner.wins++;
                loser.losses++;
                
                matches.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleString('it-IT', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}),
                    winnerName: winner.name,
                    loserName: loser.name
                });
                save();
            } else {
                alert("Seleziona due giocatori diversi!");
            }
        }

        function deletePlayer(id) {
            if(confirm("Eliminare il giocatore? I dati non potranno essere recuperati.")) {
                players = players.filter(p => p.id !== id);
                save();
            }
        }

        function clearMatches() {
            if(confirm("Cancellare lo storico partite? (Le statistiche dei giocatori rimarranno)")) {
                matches = [];
                save();
            }
        }

        function formatRank(r) {
            return r < 0 ? Math.abs(r) + "k" : r + "d";
        }

        function render() {
            const tableBody = document.getElementById('rankTableBody');
            const wS = document.getElementById('winSel');
            const lS = document.getElementById('loseSel');
            const logBody = document.getElementById('matchLogBody');

            // Classifica
            tableBody.innerHTML = '';
            const sorted = players.map(p => {
                const currentRank = p.initialRank + Math.floor((p.wins - p.losses) / 3);
                const pm = (p.initialRank + 30) + p.wins;
                return { ...p, currentRank, pm };
            }).sort((a, b) => b.pm - a.pm);

            sorted.forEach(p => {
                tableBody.innerHTML += `
                    <tr class="hover:bg-indigo-50 transition">
                        <td class="px-6 py-4 font-bold text-gray-700">${p.name}</td>
                        <td class="px-6 py-4 text-center font-mono text-sm">${formatRank(p.currentRank)}</td>
                        <td class="px-6 py-4 text-center text-indigo-700 font-extrabold">${p.pm}</td>
                        <td class="px-6 py-4 text-center text-gray-400 text-sm">${p.wins}V - ${p.losses}S</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deletePlayer('${p.id}')" class="text-red-200 hover:text-red-600 transition">✕</button>
                        </td>
                    </tr>`;
            });

            // Update Selects
            const options = '<option value="">Seleziona...</option>' + 
                players.sort((a,b) => a.name.localeCompare(b.name))
                       .map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            wS.innerHTML = options;
            lS.innerHTML = options;

            // Update Log
            logBody.innerHTML = matches.map(m => `
                <tr class="text-xs sm:text-sm">
                    <td class="px-6 py-3 text-gray-400">${m.date}</td>
                    <td class="px-6 py-3 font-semibold text-emerald-600">${m.winnerName}</td>
                    <td class="px-6 py-3 text-gray-400 italic">vincitore su</td>
                    <td class="px-6 py-3 text-gray-700 font-medium">${m.loserName}</td>
                </tr>
            `).join('');
        }

        function exportCSV() {
            if(players.length === 0) return alert("Nessun dato da esportare");
            let csv = "Nome,GradoIniziale,Vittorie,Sconfitte,PuntiMcMahon\n";
            players.forEach(p => {
                csv += `${p.name},${p.initialRank},${p.wins},${p.losses},${p.initialRank+30+p.wins}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `torneo_go_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        render();
    </script>
</body>
</html>
